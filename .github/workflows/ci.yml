name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint + Build
    runs-on: ubuntu-latest

    env:
      # Variables fictives pour faire passer le build (Prisma a besoin du provider)
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?pgbouncer=true&connection_limit=1
      DIRECT_URL: postgresql://user:pass@localhost:5432/db
      NEXTAUTH_SECRET: ci-only-not-a-real-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high || true
