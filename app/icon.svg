<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Diamant : carré rotaté 45° -->
  <rect
    x="14"
    y="14"
    width="36"
    height="36"
    transform="rotate(45 32 32)"
    fill="none"
    stroke="#C9A227"
    stroke-width="2.5"
  />
  <!-- Lettre P serif au centre, couleur or Prestigia -->
  <text
    x="32"
    y="42"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="700"
    fill="#C9A227"
  >P</text>
</svg>
